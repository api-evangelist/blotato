modified: '2026-06-25'
reconciled: false
tags:
- Social Media
- Publishing
- AI Content
- Automation
- Content Creation
- Plans
description: >-
  Blotato sells flat monthly (or discounted annual) subscription tiers -
  Starter, Creator, and Agency - rather than usage-metered API pricing. Writing
  is unlimited on every plan; AI credits power image and video generation and
  scale with the tier. API access is unlocked on a paid subscription; generating
  an API key ends a free trial. Exact per-tier API entitlements are not fully
  reconciled here.
notes: >-
  Prices and credit allotments observed on the Blotato pricing page and may
  change. Annual plans advertise roughly 17% savings plus bonus AI credits and
  Claude Skills. Confirm which paid tier(s) grant API access during reconciliation.
sources:
- https://www.blotato.com/pricing
- https://help.blotato.com/api/start
- https://help.blotato.com/settings/api-keys
plans:
- id: blotato-starter
  name: Starter
  type: flat
  description: >-
    Entry subscription with unlimited writing and a monthly AI credit allotment
    for image and video generation.
  entries:
  - label: Starter Subscription
    name: starter
    type: flat
    metric: subscription
    limit: -1
    timeFrame: month
    geo: global
    unit: 1
    price: $29/month
    userMultiplied: false
  - label: AI Credits
    name: ai_credits
    type: usage
    metric: credits
    limit: 1250
    timeFrame: month
    geo: global
    unit: 1250
