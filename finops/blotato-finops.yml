- Automation
- Content Creation
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Blotato spend. Blotato bills a flat monthly (or discounted
  annual) subscription per tier (Starter, Creator, Agency) rather than
  per-request API metering. Writing is unlimited; the principal variable cost
  driver is AI credits, which power image and video generation and are allotted
  per tier. API access is included with a paid subscription.
notes: >-
  Subscription prices and credit allotments are subject to change; verify
  against the Blotato pricing page during reconciliation.
sources:
- https://www.blotato.com/pricing
- https://help.blotato.com/api/start
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Blotato
serviceCategory: Web and Application Services
billingModel:
  pricingCategory: Subscription-Based
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
focusColumns:
  ServiceName: Blotato
  ServiceCategory: Web and Application Services
  ProviderName: Blotato
  PublisherName: Blotato
  InvoiceIssuerName: Blotato
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Subscription-Based
meters:
- name: subscription
  description: Flat monthly or annual subscription fee per plan tier.
  unit: subscription
  aggregation: sum
  dimensions:
  - account
  - plan
- name: ai_credits
  description: AI credits consumed for image and video generation, allotted per tier.
  unit: credits
  aggregation: sum
  dimensions:
  - account
  - plan
- name: posts_published
  description: Posts published or scheduled across connected social accounts.
  unit: posts
  aggregation: sum
  dimensions:
  - account
  - platform
- name: media_uploads
  description: Media items uploaded to Blotato for use in posts.
  unit: uploads
  aggregation: sum
  dimensions:
  - account
principles:
- name: Visibility
  description: Track subscription tier, AI credit burn, and publishing volume per account.
- name: Allocation
  description: Map API keys and connected accounts to teams/clients and internal cost centers.
- name: Optimization
  description: Right-size the plan tier to actual credit usage; favor unlimited writing over credit-consuming generation where possible.
- name: Accountability
  description: Assign owners per account/key; review credit consumption monthly against the tier allotment.
maintainers:
